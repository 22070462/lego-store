<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Bag</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">
<a href="index.html" class="logo">PLAYARENA</a>

<div class="search">
<input type="text" placeholder="Search sets, themes, and more">
</div>

<div class="icons">
<a href="login.html">👤</a>
<span>♡</span>
<a href="cart.html" class="cart-icon">
🛒
<span class="cart-count">0</span>
</a>
</div>
</header>


<!-- CART PAGE -->

<section class="cart-page">

<h1>My Bag (0)</h1>

<div class="cart-layout">

<!-- LEFT SIDE -->

<div class="cart-items"></div>

<div class="promo">
Add a Promo Code
</div>


<!-- RIGHT SIDE -->

<div class="order-summary">

<h3>Order Summary</h3>

<div class="summary-row">
<span class="subtotal-items">Subtotal (0 items)</span>
<span class="subtotal-price">$0</span>
</div>

<div class="summary-row">
<span>Estimated Shipping</span>
<span class="free">FREE</span>
</div>

<div class="summary-row">
<span>Estimated Tax</span>
<span>$35.20</span>
</div>

<hr>

<div class="summary-row total">
<span>Total</span>
<span class="total-price">$0</span>
</div>

<button class="checkout">Checkout Securely</button>

<button class="paypal">Pay with PayPal</button>

</div>

</div>

</section>


<!-- RECOMMENDED -->

<section class="recommended">

<h2>Recommended For You</h2>

<div class="product-grid">

<div class="product-card">
<img src="images/mario.jpg">
<h4>Mario Kart™ Luigi</h4>
<p>$179.99</p>
<button>Add to Bag</button>
</div>

<div class="product-card">
<img src="images/zelda.jpg">
<h4>Zelda Final Battle</h4>
<p>$159.99</p>
<button>Add to Bag</button>
</div>

<div class="product-card">
<img src="images/sunflower.jpg">
<h4>Sunflower Bouquet</h4>
<p>$14.99</p>
<button>Add to Bag</button>
</div>

</div>

</section>


<footer class="footer">
<p>© PLAYARENA</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.querySelector(".cart-items");
const totalPrice = document.querySelector(".total-price");
const subtotalPrice = document.querySelector(".subtotal-price");
const subtotalItems = document.querySelector(".subtotal-items");
const cartTitle = document.querySelector(".cart-page h1");
const cartBadge = document.querySelector(".cart-count");


/* RENDER CART */

function renderCart(){

container.innerHTML="";

if(cart.length === 0){

container.innerHTML = `
<div class="empty-cart">
<h2>Your bag is empty</h2>
<a href="products.html" class="continue-shopping">
Continue Shopping
</a>
</div>
`;

updateTotal();
updateCartCount();
return;

}

cart.forEach(item=>{

const div = document.createElement("div");

div.className="cart-item";

div.innerHTML = `

<img src="${item.img}" width="120">

<div class="item-info">
<h3>${item.name}</h3>
<p>$${item.price}</p>

<div class="qty">
<button onclick="changeQty('${item.id}',-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty('${item.id}',1)">+</button>
</div>

<p class="remove" onclick="removeItem('${item.id}')">Remove</p>
</div>

<div class="item-price">
$${(item.price * item.qty).toFixed(2)}
</div>

`;

container.appendChild(div);

});

updateTotal();
updateCartCount();

}


/* CHANGE QTY */

function changeQty(id,delta){

const item = cart.find(p=>p.id===id);

if(!item) return;

item.qty += delta;

if(item.qty <=0){

cart = cart.filter(p=>p.id!==id);

}

saveCart();
renderCart();

}


/* REMOVE ITEM */

function removeItem(id){

cart = cart.filter(p=>p.id!==id);

saveCart();
renderCart();

}


/* SAVE */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart));

}


/* TOTAL */

function updateTotal(){

let total = 0;
let count = 0;

cart.forEach(p=>{

total += p.price * p.qty;
count += p.qty;

});

totalPrice.innerText = "$"+total.toFixed(2);
subtotalPrice.innerText = "$"+total.toFixed(2);
subtotalItems.innerText = "Subtotal ("+count+" items)";
cartTitle.innerText = "My Bag ("+count+")";

}


/* CART BADGE */

function updateCartCount(){

const total = cart.reduce((sum,item)=>sum+item.qty,0);

if(cartBadge) cartBadge.innerText = total;

}


/* LOAD */

renderCart();
updateCartCount();

</script>

</body>
</html>
