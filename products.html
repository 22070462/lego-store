<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<a href="index.html" class="logo">PLAYARENA</a>

<div class="search">
<input type="text" placeholder="Search sets, themes, and more">
</div>

<div class="icons">
<a id="accountIcon" href="login.html">👤</a>
<span>♡</span>
<a href="cart.html" class="cart-icon">
🛒
<span class="cart-count">0</span>
</a>
</div>

</header>


<!-- PRODUCTS PAGE -->

<section class="products-page">

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>PRODUCT TYPE</h3>

<label><input type="checkbox" value="standard" class="type-filter"> Standard Bricks</label>
<label><input type="checkbox" value="technic" class="type-filter"> Technic</label>
<label><input type="checkbox" value="duplo" class="type-filter"> Duplo</label>

<h3>AGE RANGE</h3>

<button class="age-btn" data-age="1.5">1.5+</button>
<button class="age-btn" data-age="4">4+</button>
<button class="age-btn" data-age="9">9+</button>
<button class="age-btn" data-age="13">13+</button>

<h3>PRICE</h3>

<label><input type="checkbox" value="0-25" class="price-filter"> $0 - $25</label>
<label><input type="checkbox" value="25-50" class="price-filter"> $25 - $50</label>
<label><input type="checkbox" value="50-100" class="price-filter"> $50 - $100</label>

</aside>


<!-- PRODUCTS -->

<div class="products-container">

<h1>PRODUCTS</h1>

<div class="product-tools">

<input type="text" id="searchInput" placeholder="Search products...">

<select id="sortSelect">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
<option value="new">Newest</option>
</select>

</div>

<div class="product-grid">

<div class="product-card"
data-id="1"
data-name="Galactic Starship"
data-price="89.99"
data-img="images/starship.jpg"
data-type="standard"
data-age="9"
data-price-range="50-100">

<img src="images/starship.jpg">
<h4>Galactic Starship</h4>
<p>$89.99</p>
<button class="add-cart">Add</button>
</div>

<div class="product-card"
data-id="2"
data-name="Industrial Crane"
data-price="149.99"
data-img="images/cranetruck.jpg"
data-type="technic"
data-age="9"
data-price-range="100+">

<img src="images/cranetruck.jpg">
<h4>Industrial Crane</h4>
<p>$149.99</p>
<button class="add-cart">Add</button>

</div>


<div class="product-card"
data-id="3"
data-name="Racer Z-100"
data-price="34.99"
data-img="images/racer.jpg"
data-type="standard"
data-age="4"
data-price-range="0-25">

<img src="images/racer.jpg">
<h4><a href="product-detail.html">Racer Z-100</a></h4>
<p>$34.99</p>
<button class="add-cart">Add</button>

</div>


<div class="product-card"
data-id="4"
data-name="Botanical Wildflower"
data-price="59.99"
data-img="images/botaflower.jpg"
data-type="duplo"
data-age="1.5"
data-price-range="25-50">

<img src="images/botaflower.jpg">
<h4>Botanical Wildflower</h4>
<p>$59.99</p>
<button class="add-cart">Add</button>
</div>

</div>

</div>

</section>


<!-- FOOTER -->

<footer class="footer">
<p>© PLAYARENA</p>
</footer>

<script>

const products = document.querySelectorAll(".product-card");

const searchInput = document.getElementById("searchInput");
const sortSelect = document.getElementById("sortSelect");

const typeFilters = document.querySelectorAll(".type-filter");
const priceFilters = document.querySelectorAll(".price-filter");
const ageButtons = document.querySelectorAll(".age-btn");

let selectedAge = null;


/* AGE FILTER */

ageButtons.forEach(btn => {

btn.addEventListener("click", () => {

ageButtons.forEach(b => b.classList.remove("active"));

btn.classList.add("active");

selectedAge = btn.dataset.age;

filterProducts();

});

});


/* SEARCH */

searchInput.addEventListener("input", filterProducts);


/* CHECKBOX FILTER */

[typeFilters, priceFilters].forEach(group => {

group.forEach(filter => {

filter.addEventListener("change", filterProducts);

});

});


/* SORT */

sortSelect.addEventListener("change", () => {

const grid = document.querySelector(".product-grid");

const productArray = [...products];

if(sortSelect.value === "low"){

productArray.sort((a,b)=> getPrice(a)-getPrice(b));

}

if(sortSelect.value === "high"){

productArray.sort((a,b)=> getPrice(b)-getPrice(a));

}

if(sortSelect.value === "new"){

productArray.reverse();

}

productArray.forEach(p => grid.appendChild(p));

});


function getPrice(product){

return parseFloat(
product.querySelector("p").innerText.replace("$","")
);

}


/* MAIN FILTER */

function filterProducts(){

const search = searchInput.value.toLowerCase();

const activeTypes =
[...typeFilters].filter(c=>c.checked).map(c=>c.value);

const activePrices =
[...priceFilters].filter(c=>c.checked).map(c=>c.value);

products.forEach(product=>{

const name =
product.querySelector("h4").innerText.toLowerCase();

const type = product.dataset.type;
const price = product.dataset.priceRange;
const age = product.dataset.age;

let show = true;


/* SEARCH */

if(search && !name.includes(search))
show = false;


/* TYPE */

if(activeTypes.length && !activeTypes.includes(type))
show = false;


/* PRICE */

if(activePrices.length && !activePrices.includes(price))
show = false;


/* AGE */

if(selectedAge && age < selectedAge)
show = false;


/* SHOW / HIDE */

product.classList.toggle("hide", !show);

});

}


/* URL FILTER */

const params = new URLSearchParams(window.location.search);
const typeParam = params.get("type");

if(typeParam){

typeFilters.forEach(c=>{

if(c.value === typeParam){

c.checked = true;

}

});

filterProducts();

}

</script>

<script>

/* LOAD CART */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartBadge = document.querySelector(".cart-count");


/* ADD BUTTON */

document.querySelectorAll(".add-cart").forEach(btn => {

btn.addEventListener("click", () => {

const card = btn.closest(".product-card");

const product = {

id: card.dataset.id,
name: card.dataset.name,
price: parseFloat(card.dataset.price),
img: card.dataset.img,
qty: 1

};

addToCart(product);

});

});


/* ADD TO CART */

function addToCart(product){

const exist = cart.find(p => p.id === product.id);

if(exist){

exist.qty++;

}else{

cart.push(product);

}

saveCart();
updateCartBadge();

}


/* SAVE */

function saveCart(){

localStorage.setItem("cart", JSON.stringify(cart));

}


/* BADGE */

function updateCartBadge(){

if(!cartBadge) return;

const total = cart.reduce((sum,item)=>sum + item.qty,0);

cartBadge.innerText = total;

}


/* LOAD BADGE */

updateCartBadge();

</script>

<script>

const token = localStorage.getItem("token")

if(token){

const icon=document.getElementById("accountIcon")

if(icon){

icon.href="profile.html"

}

}

</script>

</body>
</html>
