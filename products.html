<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<div class="logo">LEGO</div>

<input class="search" placeholder="Search sets, themes, and more">

<div class="icons">
<span>👤</span>
<span>♡</span>
<span>🛒</span>
</div>
</header>


<section class="products-page">

<div class="sidebar">

<h3>PRODUCT TYPE</h3>

<label><input type="checkbox"> Standard Bricks</label>
<label><input type="checkbox"> Technic</label>
<label><input type="checkbox"> Duplo</label>

<h3>AGE RANGE</h3>

<button>1.5+</button>
<button>4+</button>
<button class="active">9+</button>
<button>13+</button>

<h3>PRICE</h3>

<label><input type="checkbox"> $0 - $25</label>
<label><input type="checkbox"> $25 - $50</label>
<label><input type="checkbox"> $50 - $100</label>

</div>


<div class="products-container">

<h1>PRODUCTS</h1>

<div class="product-grid">

<div class="product-card">
<img src="images/lego1.jpg">
<h4>Galactic Starship</h4>
<p>$89.99</p>
<button>Add</button>
</div>

<div class="product-card">
<img src="images/lego2.jpg">
<h4>Industrial Crane</h4>
<p>$149.99</p>
<button>Add</button>
</div>

<div class="product-card">
<img src="images/lego3.jpg">
<h4>Racer Z-100</h4>
<p>$34.99</p>
<button>Add</button>
</div>

<div class="product-card">
<img src="images/lego4.jpg">
<h4>Botanical Wildflower</h4>
<p>$59.99</p>
<button>Add</button>
</div>

</div>

</div>

</section>


<footer class="footer">
<p>© PLAYARENA</p>
</footer>

</body>

</html>
