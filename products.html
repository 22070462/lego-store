<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<a href="index.html" class="logo">PLAYARENA</a>

<div class="search">
<input type="text" placeholder="Search sets, themes, and more">
</div>

<div class="icons">
<span>👤</span>
<span>♡</span>
<a href="cart.html">🛒</a>
</div>

</header>


<!-- PRODUCTS PAGE -->

<section class="products-page">

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>PRODUCT TYPE</h3>

<label><input type="checkbox"> Standard Bricks</label>
<label><input type="checkbox"> Technic</label>
<label><input type="checkbox"> Duplo</label>

<h3>AGE RANGE</h3>

<button>1.5+</button>

<div class="products-container">

</div>

<button>Add</button>
</div>

</div>

</div>

</section>


<!-- FOOTER -->

<footer class="footer">
<p>© PLAYARENA</p>
</footer>
