<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BrickWorld | Star Wars Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
body{
font-family:'Spline Sans',sans-serif;
overflow:hidden;
background-color:#0b0f19;
}

@keyframes float{
0%,100%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-20px) rotate(5deg);}
}

.lego-char{
animation:float 6s ease-in-out infinite;
pointer-events:none;
}

.char-2{animation-delay:-2s;}
.char-3{animation-delay:-4s;}

</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative text-white">

<img src="https://www.lego.com/cdn/cs/set/assets/blt56e18f8303e83921/75363.png"
class="lego-char absolute top-10 left-10 w-32 opacity-20 hidden lg:block">

<img src="https://www.lego.com/cdn/cs/set/assets/blta6b772421398860c/75362.png"
class="lego-char char-2 absolute bottom-10 left-20 w-40 opacity-30 hidden lg:block">

<img src="https://www.lego.com/cdn/cs/set/assets/blt0a8972d057a7593c/75364.png"
class="lego-char char-3 absolute top-20 right-10 w-36 opacity-25 hidden lg:block">

<div class="max-w-md w-full bg-white/10 backdrop-blur-sm rounded-3xl shadow-xl overflow-hidden border border-slate-700 z-10">

<div class="p-8 md:p-10">

<div class="flex flex-col items-center mb-10">

<div class="bg-orange-500 w-14 h-14 rounded-2xl flex items-center justify-center mb-4">
<span class="text-white font-black text-2xl">B</span>
</div>

<h2 class="text-2xl font-black tracking-tighter text-white">
MAY THE BRICK BE WITH YOU
</h2>

<p class="text-slate-400 text-sm mt-1">
Ready to build your galaxy?
</p>

</div>

<form id="loginForm" class="space-y-5">

<div class="space-y-2">

<label class="text-sm font-bold text-slate-300 ml-1">
Email
</label>

<input
id="email"
type="email"
placeholder="name@example.com"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white"
/>

</div>

<div class="space-y-2">

<label class="text-sm font-bold text-slate-300 ml-1">
Password
</label>

<input
id="password"
type="password"
placeholder="••••••••"
class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-3.5 px-5 text-white"
/>

</div>

<button
type="submit"
class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl mt-2">

LOGIN

</button>

</form>

<div class="mt-8 text-center border-t border-slate-700 pt-6">

<p class="text-sm text-slate-400">

Join the resistance.

<a href="#" onclick="showRegister()" class="text-orange-400 font-black">
Sign Up
</a>

</p>

</div>

</div>
</div>

<script>
const API_BASE = "http://localhost:3000";

// LOGIN
document
  .getElementById("loginForm")
  .addEventListener("submit", login);

async function login(e) {
  e.preventDefault();

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) {
    alert("Email and password are required");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Login failed");
      return;
    }

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);
      localStorage.setItem("userEmail", email);

      if (data.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }
    } else {
      alert(data.message || "Login failed");
    }
  } catch (err) {
    alert("Unable to connect to server");
  }
}

// Simple register using prompts (optional)
async function register() {
  const email = prompt("Enter email");
  const password = prompt("Enter password (min 6 chars)");

  if (!email || !password) {
    alert("Email and password are required");
    return;
  }

  try {
    const res = await fetch(API_BASE + "/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();
    alert(data.message || "Done");
  } catch (err) {
    alert("Unable to connect to server");
  }
}

function showRegister() {
  register();
}
</script>

</body>
</html>
